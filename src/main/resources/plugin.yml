name: ${project.name}
main: de.jeter.chatex.ChatEx
version: ${project.version}
authors: [ Fatalixshell ]
contributors: [ TheJeterLP, Wizard_x ]
description: Modernized fork of ChatEx for Paper and Purpur
softdepend: [ LuckPerms, Vault, PlaceholderAPI, Essentials ]
api-version: 1.13

commands:
  chatex:
    description: ChatEx Plugin commands

permissions:
  chatex.allowchat:
    description: Allows chatting
    default: true
  chatex.chat.global:
    description: Is needed to use the global chat (if ranged mode is enabled) or Cross server chat
    default: false
  chatex.chat.color:
    description: Is needed to use color codes with & in chat
    default: false
  chatex.mentions.use:
    description: Allows mentioning players with @player when Mentions.RequirePermission is enabled
    default: false
  chatex.mentions.notify:
    description: Allows receiving mention notifications when Mentions.Notify.RequirePermission is enabled
    default: false
  chatex.antispam.bypass:
    description: Is needed to bypass the antispam system
    default: op
  chatex.bypassads:
    description: Is needed to bypass the AdBlocker
    default: op
  chatex.blockedwords.bypass:
    description: Is needed to bypass blocked words filtering
    default: op
  chatex.notifyad:
    description: Is needed to be messaged when a player tries to advertise.
    default: op
  chatex.notifyupdate:
    description: Is needed to get notiefied about new updates when you join
    default: op
  chatex.clear:
    description: Is needed to use /chatex clear to clear the chat
    default: op
  chatex.reload:
    description: Is needed to use /chatex reload to reload the config and messages of chatex.
    default: op
